<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spreakr</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div id="app" class="app is-visible">
      <div id="security-banner" class="security-banner hidden" role="alert" aria-live="polite"></div>
      <div class="app__shell">
      <aside class="sidebar">
        <div class="sidebar__logo-wrap">
          <span class="logo-text sidebar__logo-text">
            <span style="color: #4f7fff">Spre</span><span style="color: #f0f2f8">akr</span>
          </span>
          <img
            src="/LOGO.PNG"
            width="40"
            height="40"
            alt=""
            style="border-radius: 6px; object-fit: contain"
          />
        </div>
        <div class="accounts">
          <div class="accounts__label">Accounts</div>
          <button type="button" class="pill" id="pill-gmail" data-provider="gmail" aria-pressed="false">
            <span class="pill__badge">G</span>
            <span>Gmail</span>
          </button>
          <button type="button" class="pill" id="pill-outlook" data-provider="outlook" aria-pressed="false">
            <span class="pill__badge">O</span>
            <span>Outlook</span>
          </button>
        </div>
        <nav class="nav">
          <button type="button" class="nav__btn is-active" data-view="inbox">Inbox</button>
          <button type="button" class="nav__btn" data-view="sent">Sent</button>
          <button type="button" class="nav__btn" data-view="compose">Compose</button>
        </nav>
        <button type="button" class="sidebar__settings-btn icon-btn" id="btn-settings" title="Settings" aria-label="Settings">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3" />
            <path
              d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"
            />
          </svg>
        </button>
        <div class="sidebar__footer">
          <div class="sidebar__user">
            <div class="avatar" id="user-avatar" title="Account">?</div>
            <div class="sidebar__user-meta">
              <div class="sidebar__user-name mono" id="user-name">—</div>
              <div class="sidebar__user-plan mono" id="user-plan">trial</div>
            </div>
          </div>
        </div>
      </aside>

      <section class="panel-list">
        <div class="search-wrap">
          <input type="search" class="search" id="search-input" placeholder="Search inbox…" autocomplete="off" />
        </div>
        <div class="email-list" id="email-list"></div>
      </section>

      <main class="panel-main">
        <div id="thread-view" class="thread">
          <div id="thread-empty" class="empty-hint">Select an email or open Compose.</div>
          <div id="thread-content" class="hidden">
            <div class="thread__hdr">
              <div class="thread__subject" id="thread-subject"></div>
              <div class="thread__row"><strong>From</strong><span id="thread-from"></span></div>
              <div class="thread__row"><strong>To</strong><span id="thread-to"></span></div>
            </div>
            <div class="thread__body" id="thread-body"></div>
          </div>
        </div>

        <div id="compose-fields" class="compose-fields hidden">
          <div class="field">
            <label for="compose-to">To</label>
            <input type="text" id="compose-to" placeholder="name@company.co.za" autocomplete="off" />
          </div>
          <div class="field">
            <label for="compose-subject">Subject</label>
            <input type="text" id="compose-subject" placeholder="Subject" autocomplete="off" />
          </div>
        </div>
      </main>
      </div>

      <div id="ai-float-card" class="ai-float">
        <div id="ai-float-drag" class="ai-float__drag" aria-label="Move panel" role="separator"></div>
        <div class="ai-float__inner">
          <div class="ai-area__label">
            <select id="lang-select" class="lang-select" aria-label="Draft language">
              <option value="af">Afrikaans</option>
              <option value="en">English</option>
              <option value="de">Deutsch</option>
              <option value="hi">हिन्दी</option>
              <option value="fr">Français</option>
            </select>
            <span id="ai-label-text">AI reply</span>
          </div>
          <textarea class="textarea-lg" id="reply-body" placeholder="Your message…"></textarea>
          <div class="btn-row" id="btn-row-reply">
            <button type="button" class="btn btn--mic" id="btn-dictate-reply">🎤 Dictate Reply</button>
            <button type="button" class="btn btn--primary" id="btn-send-reply">✉ Send</button>
            <button type="button" class="btn btn--danger" id="btn-discard-reply">Discard</button>
          </div>
          <div class="btn-row hidden" id="btn-row-compose">
            <button type="button" class="btn btn--mic" id="btn-dictate-compose">🎤 Dictate</button>
            <button type="button" class="btn btn--primary" id="btn-send-compose">✉ Send</button>
          </div>
          <p class="status-bar" id="status-bar"></p>
        </div>
      </div>
    </div>

    <div id="modal-settings" class="modal-backdrop hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal modal--wide">
        <h3 id="modal-title">Settings</h3>
        <p class="modal-muted">Connected mail accounts, language, and billing.</p>

        <div class="settings-block">
          <h4 class="settings-block__title">Language</h4>
          <p class="modal-muted">Saved to your profile immediately.</p>
          <select id="settings-lang" class="settings-select">
            <option value="af">Afrikaans</option>
            <option value="en">English</option>
            <option value="de">Deutsch</option>
            <option value="hi">हिन्दी</option>
            <option value="fr">Français</option>
          </select>
        </div>

        <div class="settings-block">
          <h4 class="settings-block__title">Mail accounts</h4>
          <ul id="settings-accounts" class="settings-accounts"></ul>
          <div class="settings-connect">
            <a class="btn btn--ghost btn--sm" href="/auth/google?mode=connect" id="link-connect-google">Connect Gmail</a>
            <a class="btn btn--ghost btn--sm" href="/auth/microsoft?mode=connect" id="link-connect-microsoft">Connect Outlook</a>
          </div>
        </div>

        <div class="modal__actions">
          <button type="button" class="btn btn--ghost" id="modal-close">Close</button>
          <button type="button" class="btn btn--danger" id="btn-logout">Log out</button>
        </div>
      </div>
    </div>

    <div id="modal-upgrade" class="modal-backdrop hidden" role="dialog" aria-modal="true" aria-labelledby="upgrade-title">
      <div class="modal">
        <h3 id="upgrade-title">Upgrade required</h3>
        <p id="upgrade-message" class="modal-muted"></p>
        <div class="modal__actions">
          <button type="button" class="btn btn--ghost" id="upgrade-close">Close</button>
          <a class="btn btn--primary" href="mailto:sales@spreakr.com?subject=Spreakr%20Pro">Contact sales</a>
        </div>
      </div>
    </div>

    <div
      id="highlight-toolbar"
      class="highlight-toolbar hidden"
      role="toolbar"
      aria-label="Highlight selection"
      aria-hidden="true"
    >
      <button type="button" class="highlight-toolbar__circle" data-hl="red" title="Red highlight">🔴</button>
      <button type="button" class="highlight-toolbar__circle" data-hl="amber" title="Amber highlight">🟡</button>
      <button type="button" class="highlight-toolbar__circle" data-hl="green" title="Green highlight">🟢</button>
      <button type="button" class="highlight-toolbar__clear" data-hl="clear" title="Clear highlight">✕</button>
    </div>

    <script src="/api.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
